services:
  # ── Backend FastAPI API Server ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docquery_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - APP_NAME=DocQuery AI
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - API_KEY=your-secret-api-key-change-me
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma3:4b
      - SQLITE_URL=sqlite+aiosqlite:///./data/sqlite/docquery.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json

  # ── Streamlit UI Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docquery_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      # Inject backend URL and session settings
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

